name: Build

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: Authenticate to GitHub Packages
        run: |
          dotnet nuget remove source github || true
          dotnet nuget add source "https://nuget.pkg.github.com/mihainegrisan/index.json" \
            --name github \
            --username ${{ github.repository_owner }} \
            --password ${{ secrets.GITHUB_TOKEN }}

      - name: Restore dependencies
        run: dotnet restore MFO.CatalogService.sln

      - name: Build
        run: dotnet build MFO.CatalogService.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test MFO.CatalogService.sln --no-build --configuration Release --verbosity normal
